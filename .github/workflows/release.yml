name: Build & Release CVs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra

      - name: Build all CVs
        run: make all

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: CVs - Build (${{ github.run_number }})
          files: |
            build/Rafael_Queiroz_Data_Engineer.pdf
            build/Rafael_Queiroz_Python_Developer.pdf
            build/Rafael_Queiroz_DevOps_Engineer.pdf
            build/Rafael_Queiroz_Java_Developer.pdf
          generate_release_notes: true
